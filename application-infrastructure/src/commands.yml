version: 0.2

# BUILD ENVIRONMENT VARIABLES are specified in Application Template during deployment# 
# You can also run the command `printenv`
#
# Use BUILD ENVIRONMENT VARIABLES as conditionals, customizations, or parameters/arguments for scripts

phases:
  install:
    runtime-versions:
      nodejs: latest
      python: latest
    commands:
      
      - ls -l -a

      # Build Environment information for debugging purposes
      - python3 --version
      - node --version
      - aws --version

      # Configure pip cache directory
      - mkdir -p /root/.cache/pip
      - pip config set global.cache-dir /root/.cache/pip

      # Build Environment: Install Python dependencies for Build Scripts if build-scripts/requirements.txt exists
      - |
        if [ -f "scripts/requirements.txt" ]; then
          echo "Installing Python dependencies for build scripts"
          pip install -r scripts/requirements.txt
        else
          echo "No scripts/requirements.txt found, skipping pip install"
        fi

  pre_build:
    commands:

      # Mount S3 as a File System
      
      - |
        if [ "${S3_MOUNT_POINT}" != "" ] && [ "${S3_BUCKET_NAME}" != "" ]; then
          echo "Mounting S3 bucket ${S3_BUCKET_NAME} to ${S3_MOUNT_POINT}"
          mkdir -p ${S3_MOUNT_POINT}
          sudo mount-s3 ${S3_BUCKET_NAME} ${S3_MOUNT_POINT}
        else
          echo "S3_MOUNT_POINT or S3_BUCKET_NAME not set, skipping S3 mount"
        fi

      # Gather data from other sources such as SSM Parameters, S3, APIs

      # Example: Read an SSM Parameter
      - aws ssm get-parameter --name "${PARAM_STORE_HIERARCHY}ExampleParameter" --query "Parameter.Value" --output text

  build:
    commands:

      # Run your scripts here
      - python3 scripts/hello.py

      # list files
      - ls -l -a

# add cache
cache:
  paths:
    - '/root/.cache/pip/**/*'